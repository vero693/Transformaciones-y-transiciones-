<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax</title>
    <style>
        body {
            margin: 0;
        }

        .parallax-container {
            height: 100vh;
            perspective: 8px;
            perspective-origin: 50%;
            overflow-x: hidden;
            overflow-y: scroll;
            position: relative;
        }

        .image {
            position: absolute;
            transform: 0 50%;
        }

        .image__background {
            transform: 0 50%;
        }

        .image__middle {
            width: 100%;
            height: 100%;
            transform: translateZ(5px) scale(0.375);
            transform-origin: 50%;
        }

        .image__foreground {
            transform: translateZ(2px) scale(0.75);
            transform-origin: top;
        }

        .card {
            background-color: white;
            width: 80px;
            height: 100px;
            border-radius: 8px;
            position: absolute;
            transform: rotate(-20px);
        }

        .one {
            left: 30%;
            top: 200px;
        }

        .two {
            right: 20%;
            top: 400px;
        }

        .three {
            right: 60%;
            bottom: -700px;
        }
    </style>
</head>
<body>
    <div class="parallax-container">
        <div class="image image__background">
            <img src="assets/Background.png" alt="">
        </div>
        <div class="image image__middle">
            <div class="card one"></div>
            <div class="card two"></div>
            <div class="card three"></div>
        </div>
        <div class="image image__foreground">
            <img src="assets/Alice.png" alt="">
        </div>
    </div>
</body>
</html>
