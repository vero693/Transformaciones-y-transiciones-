<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - Skew</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            border-radius: 20%;
            background-color: lightpink;
        }

        div:hover {
            transform: skewY(20deg);
            transition: all .12ms;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
