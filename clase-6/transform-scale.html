<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - Scale</title>
    <style>
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(to right, #FFE000, #799F0C, #00416A);
        }

        .circle:hover {
            transform: scale(.8, 1.2);
            transition: all .150s;
        }
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>
