<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: teal;
            border-radius: 50%;
            transition: transform 1.5s linear;
        }

        div:hover {
            transform: translateX(200px);
            transition: transform 1s linear;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
