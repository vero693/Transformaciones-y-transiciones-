<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - Style</title>
    <style>
        .container {
            width: 100px;
            height: 100px;
            border: 5px solid violet;
            position: relative;
            perspective: 100px;
        }

        .item {
            width: 100px;
            height: 100px;
            background-color: cadetblue;
            border: 3px solid burlywood;
            opacity: 0.5;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(40deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item"></div>
    </div>
</body>
</html>
