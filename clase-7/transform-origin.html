<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform - Origin</title>
    <style>
        div {
            width: 150px;
            height: 100px;
            background-color: lightseagreen;
            transform-origin: right top;
        }

        div:hover {
            transform: rotate(90deg);
            transition: all 1.2s;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
